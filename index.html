    if (last) setActive(last);
    const onResize = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const open  = (id) => { setActive(id); localStorage.setItem('portfolio-card', id); };
  const close = ()   => { setActive(null); localStorage.removeItem('portfolio-card'); };
  const nav   = (id) => setActive(id);

  const ActiveSec = active ? SECTIONS[active] : null;

  if (isMobile) return (
    <>
      <MobileView onOpen={open} accent={accent} />
      {active && (
        <div className="overlay" onClick={close}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <button className="modal-close" onClick={close}>×</button>
            {React.createElement(SECTIONS[active], { accent, onNavigate: nav })}
          </div>
        </div>
      )}
    </>
  );

  return (
    <div className="desk" style={{ '--green': accent, '--green-dim': `${accent}22` }}>
      <div className="wood-overlay" />

      <TopBar onOpen={open} />

      {/* Ambient code snippets */}
      <div className="code-note" style={{ top: '62%', left: '68%', transform: 'rotate(4deg)', opacity: 0.09 }}>
        {'def retrieve(query):\n    docs = store.search(k=4)\n    return reranker.compress(docs)'}
      </div>
      <div className="code-note" style={{ bottom: '18%', right: '2%', transform: 'rotate(-6deg)', opacity: 0.08 }}>
        {'# ReAct loop\nagent.run(\n  task, memory=True\n)'}
      </div>
      <div className="code-note" style={{ top: '55%', left: '2%', transform: 'rotate(8deg)', opacity: 0.07 }}>
        {'workflow.add_edge(\n  "classify",\n  "generate_rfp"\n)'}
      </div>

      {/* Fan of paper cards */}
      <div className="paper-pivot">
        {PAPERS.map((paper) => (
          <div key={paper.id} className="paper-wrap"
            style={{ '--rot': `${paper.rot}deg`, zIndex: paper.zi, transform: `translateX(-50%) rotate(${paper.rot}deg)` }}
            onClick={() => open(paper.id)}>
            <div className="paper-inner">
              <div className="paper-margin" />
              <div className="paper-content">
                <div className="paper-title">{paper.title}</div>
                <div className="paper-divider" />
                {paper.lines.map((l, i) => (
                  <div key={i} className={`paper-line${l.dim ? ' dim' : ''}`}>
                    {l.t || '\u00A0'}
                  </div>
                ))}
              </div>
              <div className="paper-footer">{paper.label}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Modal overlay */}
      {active && (
        <div className="overlay" onClick={close}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <button className="modal-close" onClick={close}>×</button>
            <ActiveSec accent={accent} onNavigate={nav} />
          </div>
        </div>
      )}

      <div className="desk-hint">click a page to pick it up ↑</div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
